name: Java Digest — Günlük Özet

on:
  schedule:
    - cron: '0 8 * * *'        # her gün
    - cron: '0 9 * * 1'        # Pazartesi 09:00 UTC — haftalık özet
  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalışma modu'
        required: false
        default: 'daily'
        type: choice
        options: [daily, weekly, test]

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build (fat jar)
        run: mvn -q package -DskipTests

      - name: Digest çalıştır
        env:
          DIGEST_MODE: ${{ github.event.schedule == '0 9 * * 1' && 'weekly' || inputs.mode || 'daily' }}
          SLACK_WEBHOOK_GENERAL:  ${{ secrets.SLACK_WEBHOOK_GENERAL }}
          SLACK_WEBHOOK_AMBER:    ${{ secrets.SLACK_WEBHOOK_AMBER }}
          SLACK_WEBHOOK_VALHALLA: ${{ secrets.SLACK_WEBHOOK_VALHALLA }}
          SLACK_WEBHOOK_LOOM:     ${{ secrets.SLACK_WEBHOOK_LOOM }}
          SLACK_WEBHOOK_LEYDEN:   ${{ secrets.SLACK_WEBHOOK_LEYDEN }}
          SLACK_WEBHOOK_PANAMA:   ${{ secrets.SLACK_WEBHOOK_PANAMA }}
          OPENAI_API_KEY:         ${{ secrets.OPENAI_API_KEY }}
          GEMINI_API_KEY:         ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL:           ${{ vars.GEMINI_MODEL }}
        run: java -jar target/java-digest-1.0-SNAPSHOT.jar

      - name: Değişiklikleri commit + push
        run: |
          git config user.name  "Java Digest Bot"
          git config user.email "bot@java-digest"
          git add state.json jep-state.json docs/ || true
          git diff --staged --quiet && exit 0
          git commit -m "chore: digest güncellendi [$(date +'%Y-%m-%d')]"
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true
          git pull --rebase origin main
          git push
