name: Java Digest — Günlük Özet

on:
  schedule:
    - cron: '0 8 * * *'        # her gün
    - cron: '0 9 * * 1'        # Pazartesi 09:00 UTC — haftalık özet
  workflow_dispatch:
    inputs:
      mode:
        description: 'Çalışma modu'
        required: false
        default: 'daily'
        type: choice
        options: [daily, weekly, test]

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # state.json'ı repo'ya commit etmek için

    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v4

      - name: Java 21 kur
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Maven cache
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build (fat jar)
        run: mvn -q package -DskipTests

      - name: Digest çalıştır
        env:
          DIGEST_MODE: ${{ github.event.schedule == '0 9 * * 1' && 'weekly' || 'daily' }}
          # ── Telegram ──────────────────────────────────────
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}

          # ── Slack Webhooks (opsiyonel, sadece istediğin kanalları ekle) ──
          SLACK_WEBHOOK_GENERAL:  ${{ secrets.SLACK_WEBHOOK_GENERAL }}
          SLACK_WEBHOOK_AMBER:    ${{ secrets.SLACK_WEBHOOK_AMBER }}
          SLACK_WEBHOOK_VALHALLA: ${{ secrets.SLACK_WEBHOOK_VALHALLA }}
          SLACK_WEBHOOK_LOOM:     ${{ secrets.SLACK_WEBHOOK_LOOM }}
          SLACK_WEBHOOK_LEYDEN:   ${{ secrets.SLACK_WEBHOOK_LEYDEN }}
          SLACK_WEBHOOK_PANAMA:   ${{ secrets.SLACK_WEBHOOK_PANAMA }}

        run: java -jar target/java-digest-1.0-SNAPSHOT.jar

      - name: state.json güncelle (commit + push)
        run: |
          git config user.name  "Java Digest Bot"
          git config user.email "bot@java-digest"
          git add state.json
          # Değişiklik yoksa commit atma
          git diff --staged --quiet || git commit -m "chore: state güncellendi [$(date +'%Y-%m-%d')]"
          git push
